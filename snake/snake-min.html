<style>
    button {
        width: 60px;
        height: 60px;
        font-size: 15;
        margin: 2px;
        border: none;
        border-radius: 10px;
        background-color: white
    }

    .r {
        display: flex;
        align-items: center;
        gap: 60px;
    }
</style>
<div style="padding:10px;width:360px;background-color:black;color:white;border-radius: 10px">
    <canvas width="360" height="360" style="border: 2px solid white;"></canvas>
    <p>Score: <span>0</span></p>
    <div class="r">
        <div style="display:flex;flex-direction:column;align-items:center">
            <button onclick="t([0, -1])">U</button>
            <div class="r">
                <button onclick="t([-1, 0])">L</button>
                <button onclick="t([1, 0])">R</button>
            </div>
            <button onclick="t([0, 1])">D</button>
        </div>
        <button onclick="p()">Play/Pause</button>
    </div>
</div>
<script>
    /*
    variables and function names:
    game_board                      b for board
    score                           a (placeholder)
    snake{                          s for snake
        element,                    e for element
        head                        h for head
    }
    fruit                           f for fruit
    direction                       d for direction
    game_state                      g for game
    
    draw_pixel(                     x for pixel
        color,                      c for color
        position                    e (placeholder)
    )
    random_number                   r for random
    make_fruit                      n for new
    render                          l for loop
    change_direction(               t for turn
        d                           e (placeholder)
    )
    toggle_play_pause_start         p for play/pause
    */
    let b = document.querySelector("canvas").getContext("2d");
    let a = document.querySelector("span");

    let s;
    let f;
    let d = [];
    let g = 0;

    let x = (c, e) => {
        b.fillStyle = c;
        b.fillRect(e[0] * 18, e[1] * 18, 18, 18);
    }

    let r = () => Math.floor(Math.random() * 20)

    let n = () => {
        do f = [r(), r()]
        while (s.some(e => e[0] == f[0] && e[1] == f[1]))
    }

    let l = () => {
        if (g != 1) return;
        setTimeout(() => {
            if (d.length > 1) d.shift();
            let h = [s[0][0] + d[0][0], s[0][1] + d[0][1]];
            if (h[0] < 0 || h[0] > 19 || h[1] < 0 || h[1] > 19 || s.some(e => h[0] == e[0] && h[1] == e[1])) { g = 0; return; }
            s.unshift(h);
            if (h[0] == f[0] && h[1] == f[1]) { a.innerText = parseInt(a.innerText) + 1; n(); }
            b.fillStyle = "black";
            b.fillRect(0, 0, 360, 360);
            s.forEach(e => {
                x("lightgreen", e);
            });
            x("orange", f);
            l();
        }, 200)
    }

    let t = (e) => {
        if (e[0] != d.at(-1)[0] && e[1] != d.at(-1)[1]) d.push(e);
    }

    let p = () => {
        if (g == 0) {
            a.innerText = 0;
            s = [[10, 10], [10, 11], [10, 12], [10, 13], [10, 14]];
            d = [[0, -1]];
            n();
            g = 1;
            l()
        }
        else if (g == 1) g = 2;
        else { g = 1; l() }
    }

    document.addEventListener("keydown", (e) => {
        switch (e.key) {
            case "Enter":
                p(); break;
            case "ArrowUp":
                t([0, -1]); break;
            case "ArrowDown":
                t([0, 1]); break;
            case "ArrowLeft":
                t([-1, 0]); break;
            case "ArrowRight":
                t([1, 0]); break;
        }
    })

</script>
