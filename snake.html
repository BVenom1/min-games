<style>
    button {
        width: 60px;
        height: 60px;
        font-size: 15;
        margin: 2px;
        border: none;
        border-radius: 10px;
        background-color: white
    }

    .container {
        padding: 10px;
        width: 360px;
        background-color: black;
        color: white;
        border-radius: 10px;
    }

    .column {
        display: flex;
        flex-direction: column;
        align-items: center
    }

    .row {
        display: flex;
        align-items: center;
        gap: 60px;
    }
</style>
<div class="container">
    <canvas width="360" height="360" style="border: 2p solid white;"></canvas>
    <p>Score: <span>0</span></p>
    <div class="column">
        <button onclick="change_direction([0, -1])">U</button>
        <div class="row">
            <button onclick="change_direction([-1, 0])">L</button>
            <button onclick="change_direction([1, 0])">R</button>
        </div>
        <button onclick="change_direction([0, 1])">D</button>
    </div>
</div>
<script>
    let game_board = document.querySelector("canvas").getContext("2d");
    let score = document.querySelector("span");

    let snake = [];
    let fruit;
    let direction;
    let is_playing;

    let draw_pixel = (color, position) => {
        game_board.fillStyle = color;
        game_board.fillRect(position[0] * 18, position[1] * 18, 18, 18);
    }

    let render_board = () => {
        game_board.fillStyle = "black";
        game_board.fillRect(0, 0, 360, 360);
        snake.forEach(element => {
            draw_pixel("lightgreen", element);
        });
        draw_pixel("orange", fruit);
    }

    let random_number = () => Math.floor(Math.random() * 20)

    let make_fruit = () => {
        do fruit = [random_number(), random_number()]
        while (snake.some(element => element[0] == fruit[0] && element[1] == fruit[1]))
    }

    let render = () => {
        if (!is_playing) return;
        setTimeout(() => {
            // get head of snake after the move
            let head = [snake[0][0] + direction[0], snake[0][1] + direction[1]];

            // check for collisions
            if (head[0] < 0 || head[0] > 19 || head[1] < 0 || head[1] > 19 || snake.some(element => head[0] == element[0] && head[1] == element[1])) { is_playing = false; return; }

            // add head to snake
            snake.unshift(head);

            // check for collision with fruit
            if (head[0] == fruit[0] && head[1] == fruit[1]) { score.innerText = parseInt(score.innerText) + 1; make_fruit(); }
            else snake.pop();

            // render
            render_board();

            // recursive call
            render();
        }, 200)
    }

    let change_direction = (d) => { direction = d; }

    let start_game = () => {
        score.innerText = 0;
        snake = [[10, 10], [10, 11], [10, 12], [10, 13], [10, 14]];
        direction = [0, -1];
        make_fruit();
        is_playing = true;
        render()
    }

    start_game();

</script>
